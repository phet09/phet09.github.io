<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>รายละเอียดสถานที่</title>
<link href="css/bootstrap/bootstrap.min.css" rel="stylesheet">
<link href="css/bootstrap/bootstrap-icons.css" rel="stylesheet">
<link href="css/bootstrap/Prompt.css" rel="stylesheet">
<link href="css/bootstrap/Sarabun.css" rel="stylesheet">
<link href="css/detail.css" rel="stylesheet">
<link href="css/animate.css" rel="stylesheet">
<style>
        :root {
            --primary:#00A7A7;
            --gold:#ffc107;
            --dark:#0a2f2f;
            --soft:#f3fbfa;
            --black:#089999;
        }

/* ---------- GLOBAL ---------- */
body{
  font-family: 'Sarabun', sans-serif;
  background: var(--soft);
}

h4{
  font-weight:700;
  position:relative;
  padding-bottom:8px;
  margin-bottom:20px;
}

h4::after{
  content:"";
  position:absolute;
  left:0;
  bottom:0;
  width:60px;
  height:3px;
  background:var(--gold);
  border-radius:10px;
}

/* ---------- HERO ---------- */
.hero-box{
  background: linear-gradient(135deg, var(--primary), var(--dark));
  color:#fff;
  padding:120px 20px 80px;
  text-align:center;
  position:relative;
}

.hero-title{
  font-size: clamp(28px, 5vw, 48px);
  font-weight:800;
}

/* ---------- CARD SECTION ---------- */
.section-card{
  background:#fff;
  border-radius:18px;
  padding:30px;
  box-shadow:0 15px 35px rgba(0,0,0,0.08);
  margin-bottom:35px;
  transition:0.3s ease;
}

.section-card:hover{
  transform:translateY(-3px);
}

/* ---------- CAROUSEL ---------- */
.carousel-inner img{
  border-radius:16px;
  object-fit:cover;
  max-height:500px;
}

.carousel-control-prev-icon,
.carousel-control-next-icon{
  background-color:rgba(0,0,0,0.5);
  border-radius:50%;
  padding:15px;
}

/* ---------- EMBED ---------- */
.embed-card iframe{
  width:100%;
  aspect-ratio:16/9;
  border:0;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* ---------- BUTTON ---------- */
.btn-gold{
  background: var(--gold);
  color: #000;
  font-weight: 600;
  border-radius: 30px;
  padding: 8px 22px;
  transition:0.3s;
}

.btn-gold:hover{
  background: #c9972f;
  transform:scale(1.05);
}

/* ---------- FOOTER ---------- */
footer{
  background: linear-gradient(135deg,var(--dark),#041a1a);
}

footer a{
  color:#fff;
  transition:0.3s;
}

footer a:hover{
  color:var(--gold);
}

/* ---------- LIGHTBOX ---------- */
#lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#lightbox img{
  max-width:90%;
  max-height:80%;
  border-radius:15px;
}

#lightboxClose{
  position:absolute;
  top:30px;
  right:40px;
  font-size:40px;
  color:#fff;
  cursor:pointer;
}


</style>

</head>
<body>

<!-- LIGHTBOX -->
<div id="lightbox">
  <span id="lightboxClose">&times;</span>
	<img id="lightboxImg">
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top fade-in">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center place-title" href="index.html">
      <img src="assets/img/logo-t.png" class="me-2">
      <span class="fw-bold">NamTok Travel</span>
    </a>
	  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link active" href="index.html">หน้าแรก</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html">สถานที่ท่องเที่ยว</a></li>
		<li class="nav-item"><a class="nav-link" href="index.html">เกี่ยวกับ</a></li>
      </ul>
		 <div class="ms-lg-auto">
    <a href="form.html" class="btn btn-gold">
      แบบสอบถาม
    </a>
  </div>
    </div>
  </div>
</nav>

<!-- HERO -->
<div class="hero-box fade-in" style="background:var(--primary);">
  <h1 id="place-name" class="hero-title animate-zoom" style="color: var(--gold);"></h1>
</div>

<!-- CONTENT -->
<div class="container py-5">

  <a href="index.html" class="btn btn-back mb-4">
    <img src="assets/icon/arrow-left-square-fill.svg"> กลับ
  </a>

  <!-- IMAGES -->
  <div class="section-card">
    <div id="carouselContainer"></div>
  </div>

  <!-- DETAIL -->
  <div class="section-card">
    <h4>รายละเอียด</h4>
    <p id="place-detail" class="detail-text"></p>
  </div>

  <!-- YOUTUBE -->
  <div class="section-card">
    <h4>วิดีโอแนะนำ</h4>
    <div id="youtube" class="embed-card"></div>
  </div>

  <!-- MAP -->
  <div class="section-card">
    <h4>แผนที่</h4>
    <div id="map" class="embed-card"></div>
  </div>

</div>


<!-- ================= FOOTER ================= -->
<footer class="text-white pt-5 fade-in">
    <div class="container">
        <div class="row">

            <div class="col-md-4 mb-4">
                <h5>เกี่ยวกับเรา</h5>
                <p>เว็บไซต์NamTok Travel เกิดขึ้นจากความตั้งใจเล็กๆของนักษา ที่อยากรวบรวมเสน่ห์และสถานที่ของตำบลน้ำตก</p>
            </div>

            <div class="col-md-4 mb-4">
            </div>

            <div class="col-md-4 mb-4">
                <h5>ช่องทางติดต่อ</h5>
                <a href="#" class="me-3 fs-4">
                    <i class="bi bi-facebook"></i>
                </a>
            </div>

        </div>

        <hr class="bg-white">
        <div class="text-center pb-3">©2025</div>
    </div>
</footer>

<script>
const id = new URLSearchParams(location.search).get("id");

/* NAME */
async function loadName(){
  try{
    const t = await fetch(`assets/id/${id}/name.txt`).then(r=>r.text());
    document.getElementById("place-name").innerText = t.trim();
  }catch(e){}
}

/* DETAIL */
async function loadDetail(){
  try{
    const t = await fetch(`assets/id/${id}/detail.txt`).then(r=>r.text());
    document.getElementById("place-detail").innerText = t.trim();
  }catch(e){}
}

/* YOUTUBE */
async function loadYoutube(){
  try{
    const raw = await fetch(`assets/id/${id}/youtube.txt`);
    if(!raw.ok) throw "";

    const content = (await raw.text()).trim();
    if(!content) throw "";

    if(content.includes("<iframe")){
      document.getElementById("youtube").innerHTML = content;
      return;
    }

    let videoId="";
    if(content.includes("watch?v=")){
      videoId = content.split("v=")[1].split("&")[0];
    }else if(content.includes("youtu.be/")){
      videoId = content.split("youtu.be/")[1];
    }

    if(videoId){
      document.getElementById("youtube").innerHTML = `
        <iframe
          src="https://www.youtube.com/embed/${videoId}"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>`;
    }else{
      throw "";
    }

  }catch(e){
    document.getElementById("youtube").innerHTML =
      `<p class="text-muted">ไม่มีวิดีโอ</p>`;
  }
}

/* MAP */
async function loadMap(){
  try{
    const link = await fetch(`assets/id/${id}/location.txt`).then(r=>r.text());
    document.getElementById("map").innerHTML =
      `<iframe src="${link.trim()}" allowfullscreen></iframe>`;
  }catch(e){
    document.getElementById("map").innerHTML =
      `<p class="text-muted">ไม่มีแผนที่</p>`;
  }
}

/* LIGHTBOX */
function enableLightbox(){
  const imgs = document.querySelectorAll(".carousel-item img");
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightboxImg");
  const closeBtn = document.getElementById("lightboxClose");

  imgs.forEach(img=>{
    img.onclick = ()=>{
      lightboxImg.src = img.src;
      lightbox.style.display = "flex";
    };
  });

  closeBtn.onclick = ()=> lightbox.style.display = "none";
  lightbox.onclick = e => { if(e.target === lightbox) lightbox.style.display = "none"; };
}

/* IMAGES (FAST VERSION) */
async function loadImages(){
  try{
    const list = await fetch(`assets/id/${id}/images.txt`).then(r=>r.text());
    const files = list.split("\n").map(f=>f.trim()).filter(f=>f);

    if(files.length === 0) throw "";

    let slides="";
    files.forEach((file,i)=>{
      slides += `
        <div class="carousel-item ${i===0?'active':''}">
          <img src="assets/id/${id}/img/${file}"
               class="d-block w-100"
               loading="lazy">
        </div>`;
    });

    document.getElementById("carouselContainer").innerHTML = `
      <div id="slider" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">${slides}</div>
        <button class="carousel-control-prev" type="button" data-bs-target="#slider" data-bs-slide="prev">
          <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#slider" data-bs-slide="next">
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>`;

    enableLightbox();

  }catch(e){
    document.getElementById("carouselContainer").innerHTML =
      `<p class="text-muted">ไม่มีรูปภาพ</p>`;
  }
}

/* INIT */
loadName();
loadDetail();
loadImages();
loadYoutube();
loadMap();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
